replicaCount: 2

image:
  repository: vaibhav04c/url-shortener
  pullPolicy: Always
  tag: "latest"

service:
  type: ClusterIP
  port: 80
  targetPort: 8000

ingress:
  enabled: true
  className: nginx
  host: s.trendstimes.in
  tls: true
  tlsSecretName: url-shortener-tls

config:
  awsRegion: ap-south-1
  dynamodbTable: url-shortener
  baseUrl: https://s.trendstimes.in
  redisHost: url-shortener-redis
  redisPort: "6379"
  shortCodeLength: "7"

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 250m
    memory: 256Mi

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  cpuUtilizationPercentage: 70

redis:
  enabled: true
  image: redis:7-alpine
  port: 6379
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

serviceAccount:
  create: true
  name: url-shortener-sa
  annotations: {}