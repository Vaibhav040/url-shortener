stages:
  - test
  - sast
  - dependency-check
  - build
  - scan
  - push

variables:
  IMAGE_TAG: $CI_COMMIT_SHORT_SHA
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: "/certs"

run-tests:
  stage: test
  image: python:3.12-slim
  before_script:
    - pip install -r app/requirements.txt
  script:
    - cd app
    - python -m pytest tests/test_main.py -v
        --junitxml=../report.xml
        --cov=.
        --cov-report=xml:../coverage.xml
  coverage: '/TOTAL.*\s+(\d+%)$/'
  artifacts:
    when: always
    reports:
      junit: report.xml
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    paths:
      - coverage.xml
    expire_in: 1 hour

sonarcloud-check:
  stage: sast
  image:
    name: sonarsource/sonar-scanner-cli:latest
    entrypoint: [""]
  variables:
    SONAR_USER_HOME: "${CI_PROJECT_DIR}/.sonar"
    GIT_DEPTH: "0"
  cache:
    key: sonar-cache
    paths:
      - .sonar/cache
  script:
    - sonar-scanner
        -Dsonar.projectKey=$SONAR_PROJECT_KEY
        -Dsonar.organization=$SONAR_ORGANIZATION
        -Dsonar.host.url=$SONAR_HOST_URL
        -Dsonar.login=$SONAR_TOKEN
        -Dsonar.python.coverage.reportPaths=coverage.xml
  needs:
    - run-tests
  allow_failure: false

owasp-dependency-check:
  stage: dependency-check
  image: python:3.12-slim
  script:
    - pip install pip-audit
    - mkdir -p reports
    - pip-audit -r app/requirements.txt
        --format json
        --output reports/pip-audit-report.json
  artifacts:
    when: always
    paths:
      - reports/
    expire_in: 1 week
  allow_failure: false

docker-build:
  stage: build
  image: docker:24-dind
  services:
    - docker:24-dind
  before_script:
    - echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USER" --password-stdin
  script:
    - docker build -t $DOCKER_USER/url-shortener:$IMAGE_TAG .
    - docker save $DOCKER_USER/url-shortener:$IMAGE_TAG > image.tar
  artifacts:
    paths:
      - image.tar
    expire_in: 1 hour
  needs:
    - sonarcloud-check
    - owasp-dependency-check

trivy-scan:
  
  stage: scan
  image: docker:24-dind
  services:
    - docker:24-dind
  before_script:
    - apk add --no-cache curl
    - curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
  script:
    - docker load < image.tar
    - trivy image
        --exit-code  1
        --severity HIGH,CRITICAL
        --format table
        $DOCKER_USER/url-shortener:$IMAGE_TAG
  needs:
    - docker-build
  allow_failure: false

push-image:
  stage: push
  image: docker:24-dind
  services:
    - docker:24-dind
  before_script:
    - echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USER" --password-stdin
  script:
    - docker load < image.tar
    - docker push $DOCKER_USER/url-shortener:$IMAGE_TAG
    - docker tag $DOCKER_USER/url-shortener:$IMAGE_TAG $DOCKER_USER/url-shortener:latest
    - docker push $DOCKER_USER/url-shortener:latest 
  only:
    - main